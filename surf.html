<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Surf | Play4Traffic</title>

  <link rel="stylesheet" href="/global.css" />

  <style>
    body {
      margin: 0;
      padding: 0;
      background: url('/background.jpg') center/cover no-repeat fixed;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      padding-top: 60px;
    }

    .surf-panel {
      width: 90%;
      max-width: 900px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(14px);
      border: 2px solid rgba(0, 255, 255, 0.4);
      border-radius: 22px;
      padding: 40px;
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.35);
      color: white;
      text-align: center;
      margin-bottom: 80px;
    }

    .status-text {
      font-size: 20px;
      margin-bottom: 20px;
      color: #aeefff;
    }

    .countdown-number {
      font-size: 80px;
      font-weight: 700;
      color: #00eaff;
      text-shadow: 0 0 18px #00eaff;
      margin-bottom: 20px;
    }

    .progress-bar-container {
      width: 100%;
      height: 12px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 25px;
    }

    .progress-bar {
      height: 100%;
      background: #00eaff;
      box-shadow: 0 0 12px #00eaff;
      width: 100%;
      transition: width linear;
    }

    .message {
      font-size: 18px;
      margin-bottom: 30px;
      color: #d8faff;
    }

    .btn {
      display: inline-block;
      padding: 14px 34px;
      border-radius: 999px;
      background: rgba(0, 255, 255, 0.15);
      border: 2px solid #00eaff;
      color: #00eaff;
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 0 14px #00eaff;
      transition: background 0.2s;
    }

    .btn:hover {
      background: rgba(0, 255, 255, 0.25);
    }

    #nextSiteBtn {
      display: none;
      margin-top: 20px;
    }

    #buyCreditsBtn {
      margin-top: 40px;
    }
  </style>
</head>

<body>
  <div class="surf-panel">
    <div class="status-text" id="statusText">Loading next site…</div>

    <div class="countdown-number" id="countdownNumber">0</div>

    <div class="progress-bar-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="message" id="messageText">Opening in a new tab…</div>

    <button class="btn" id="nextSiteBtn">Next Site</button>
    <button class="btn" id="buyCreditsBtn">Buy Credits</button>
  </div>

  <script type="module" src="/surf.js"></script>
</body>
</html>
