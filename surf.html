
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Surf & Earn</title>
  <link rel="stylesheet" href="global.css" />
</head>

<body class="surf-pirate-bg">

  <!-- Top Navigation -->
  <nav class="top-menu" style="
      width:100%;
      padding:15px 0;
      text-align:center;
      backdrop-filter: blur(10px);
      background: rgba(0,0,0,0.35);
      border-bottom: 1px solid rgba(255,255,255,0.15);
      margin-bottom: 25px;
    ">
    <a href="/" class="btn" style="margin:0 8px;">Home</a>
    <a href="/surf" class="btn" style="margin:0 8px;">Surf</a>
    <a href="/promote" class="btn" style="margin:0 8px;">Promote Your Link</a>
    <a href="/dashboard" class="btn" style="margin:0 8px;">Dashboard</a>
    <a href="/logout" class="btn" style="margin:0 8px;">Logout</a>
  </nav>

  <div class="container">

    <h1>Surf & Earn</h1>

    <!-- Current URL -->
    <p>Current URL:</p>
    <div id="currentUrl" class="url-box">Press Start</div>

    <!-- Timer + Earned -->
    <p>Time Left: <span id="timeLeft">0</span> seconds</p>
    <p>Credits Earned: <span id="earnedCredits">0</span></p>

    <!-- Surf Buttons -->
    <button id="startSurfBtn" class="btn">Start Surfing</button>
    <button id="nextSiteBtn" class="btn" style="display:none;">Next Site</button>

    <!-- Buy Credits Section -->
    <h2 style="margin-top:40px;">Buy Credits</h2>

    <button id="buy100" class="btn">Buy 100 Credits – $1</button>
    <button id="buy220" class="btn">Buy 220 Credits – $2</button>
    <button id="buy600" class="btn">Buy 600 Credits – $5</button>
    <button id="buy1300" class="btn">Buy 1300 Credits – $10</button>
    <button id="buy2800" class="btn">Buy 2800 Credits – $20</button>

    <button id="buyCreditsBtnTop" class="btn" style="margin-top:20px;">
      Buy Credits
    </button>

    <!-- Play to Earn -->
    <div style="text-align:center; margin-top:40px;">
      <a 
        href="/game.html" 
        class="btn" 
        style="padding:14px 28px; font-size:20px;"
      >
        Play to Earn
      </a>
    </div>

  </div>

  <!-- Surf Engine -->
  <script type="module" src="surf.js"></script>

</body>
</html>
