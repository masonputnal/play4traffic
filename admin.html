<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Play4Traffic — Admin Panel</title>
  <link rel="stylesheet" href="global.css">
</head>

<body class="home-glass-bg">

<!-- TOP NAVIGATION BAR -->
<nav class="top-nav">
  <a href="dashboard.html" class="nav-item">Dashboard</a>
  <a href="surf.html" class="nav-item">Surf</a>
  <a href="index.html" class="nav-item">Home</a>
  <a href="#" id="logoutBtn" class="nav-item nav-danger">Logout</a>
</nav>

<header>Play4Traffic — Admin Panel</header>

<div class="container">

  <div class="hero">
    <h1>Admin Control Center</h1>
    <p>Manage sites, videos, Roblox games, users, and reports.</p>
  </div>

  <!-- ADMIN TABS -->
  <div class="admin-tabs">
    <button class="admin-tab" id="tabSites">Sites</button>
    <button class="admin-tab" id="tabVideos">Videos</button>
    <button class="admin-tab" id="tabRoblox">Roblox</button>
    <button class="admin-tab" id="tabUsers">Users</button>
    <button class="admin-tab" id="tabReports">Reports</button>
  </div>

  <!-- SITES PANEL -->
  <div class="admin-panel" id="panelSites" style="display:none;">
    <h2>Manage Sites</h2>

    <form id="addSiteForm" class="admin-form">
      <input id="newSiteUrl" type="text" placeholder="Website URL" required>
      <input id="newSiteOwner" type="text" placeholder="Owner UID" required>
      <button type="submit">Add Website</button>
    </form>

    <ul id="sitesList" class="admin-list"></ul>
  </div>

  <!-- VIDEOS PANEL -->
  <div class="admin-panel" id="panelVideos" style="display:none;">
    <h2>Manage Videos</h2>

    <form id="addVideoForm" class="admin-form">
      <input id="newVideoUrl" type="text" placeholder="YouTube URL" required>
      <input id="newVideoOwner" type="text" placeholder="Owner UID" required>
      <button type="submit">Add Video</button>
    </form>

    <ul id="videosList" class="admin-list"></ul>
  </div>

  <!-- ROBLOX PANEL -->
  <div class="admin-panel" id="panelRoblox" style="display:none;">
    <h2>Manage Roblox Games</h2>

    <form id="addRobloxForm" class="admin-form">
      <input id="newRobloxUrl" type="text" placeholder="Roblox Game URL" required>
      <input id="newRobloxOwner" type="text" placeholder="Owner UID" required>
      <button type="submit">Add Roblox Game</button>
    </form>

    <ul id="robloxList" class="admin-list"></ul>
  </div>

  <!-- USERS PANEL -->
  <div class="admin-panel" id="panelUsers" style="display:none;">
    <h2>Manage Users</h2>

    <ul id="usersList" class="admin-list"></ul>

    <h3>Give User Credits</h3>
    <form id="giveCreditsForm" class="admin-form">
      <input id="creditUserUid" type="text" placeholder="User UID" required>
      <input id="creditAmount" type="number" placeholder="Amount (e.g., 9999999)" required>
      <button type="submit">Add Credits</button>
    </form>
  </div>

  <!-- REPORTS PANEL -->
  <div class="admin-panel" id="panelReports" style="display:none;">
    <h2>Reported Links</h2>
    <ul id="reportsList" class="admin-list"></ul>
  </div>

</div>

<!-- Load admin.js -->
<script type="module" src="admin.js"></script>

</body>
</html>
