[build]
  ignore = "exit 0"

[build.environment]
  NETLIFY_SKIP_SECRETS_SCAN = "true"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["stripe"]

  [functions.runtime]
    node_version = "18"

[[redirects]]
  from = "/.netlify/functions/create-checkout-session"
  to = "/.netlify/functions/create-checkout-session"
  status = 200
  force = true
