<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Play4Traffic — Play & Earn</title>
  <link rel="stylesheet" href="global.css">

  <style>
    .game-wrapper {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: rgba(0,0,0,0.6);
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
      text-align: center;
    }
    .game-iframe {
      width: 100%;
      height: 500px;
      border: none;
      border-radius: 10px;
    }
    #status {
      margin-top: 15px;
      color: var(--accent);
      font-size: 1.1rem;
    }
    #cooldownTimer {
      margin-top: 10px;
      color: #ff6666;
      font-size: 1.2rem;
      font-weight: bold;
    }
    #sessionTimer {
      margin-top: 10px;
      color: #66ff99;
      font-size: 1.2rem;
      font-weight: bold;
    }
    #progressContainer {
      width: 100%;
      height: 20px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      margin-top: 20px;
      overflow: hidden;
    }
    #progressBar {
      width: 0%;
      height: 100%;
      background: var(--accent);
      transition: width 0.2s linear;
    }

    /* Loading overlay */
    #gameLoadingOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      color: white;
      font-size: 1.4rem;
      text-align: center;
    }
    #gameLoadingOverlay .loader {
      width: 60px;
      height: 60px;
      border: 6px solid rgba(255,255,255,0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body class="home-glass-bg">

<!-- Loading Overlay -->
<div id="gameLoadingOverlay">
  <div class="loader"></div>
  <p>Loading game…</p>
</div>

<nav class="top-nav">
  <a href="dashboard.html" class="nav-item">Dashboard</a>
  <a href="surf.html" class="nav-item">Surf</a>
  <a href="game.html" class="nav-item">Game</a>
  <a href="index.html" class="nav-item">Home</a>
  <a href="#" id="logoutBtn" class="nav-item nav-danger">Logout</a>
</nav>

<header>Play4Traffic — Play & Earn</header>

<div class="game-wrapper">

  <h2>Play the Game & Earn Credits</h2>

  <iframe 
    class="game-iframe"
    src="https://plugplay.games/embed/c66b3b31090c007ab12ddabd472350186d7a2e99"
    allowfullscreen>
  </iframe>

  <!-- Progress bar -->
  <div id="progressContainer">
    <div id="progressBar"></div>
  </div>

  <p id="sessionTimer"></p>
  <p id="status">Earn credits while you play…</p>
  <p id="cooldownTimer"></p>

</div>

<script type="module" src="game.js"></script>

</body>
</html>
