<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Play4Traffic — Reset Password</title>
  <link rel="stylesheet" href="global.css">
</head>

<body class="home-glass-bg">

<header>Play4Traffic — Reset Password</header>

<div class="container">

  <div class="card">
    <h2>Reset Your Password</h2>

    <!-- No form tag to prevent reload -->
    <input id="email" type="email" placeholder="Enter your email">

    <button class="btn" id="resetBtn">Send Reset Link</button>

    <p id="resetStatus" style="margin-top:10px; color:var(--accent);"></p>

    <p style="margin-top:15px;">
      Remembered your password?
      <a href="login.html">Login</a>
    </p>
  </div>

</div>

<script type="module" src="reset-password.js"></script>

</body>
</html>
