<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Play4Traffic — Promote Your Links</title>
  <link rel="stylesheet" href="global.css">
</head>

<body class="home-glass-bg">

<nav class="top-nav">
  <a href="dashboard.html" class="nav-item">Dashboard</a>
  <a href="surf.html" class="nav-item">Surf</a>
  <a href="index.html" class="nav-item">Home</a>
  <a href="#" id="logoutBtn" class="nav-item nav-danger">Logout</a>
</nav>

<header>Play4Traffic — Promote Your Links</header>

<div class="container">

  <div class="hero">
    <h1>Promote Your Links</h1>
    <p>Your credits are used to promote your links to other surfers.</p>
    <p id="userCredits">Credits: 0</p>
  </div>

  <!-- PROMOTION TABS -->
  <div class="promote-tabs">
    <button class="promote-tab active" data-type="site">Website</button>
    <button class="promote-tab" data-type="youtube">YouTube</button>
    <button class="promote-tab" data-type="roblox">Roblox</button>
  </div>

  <!-- PROMOTION FORM -->
  <form id="promoteForm" class="promote-form">

    <label id="urlLabel">Website URL</label>
    <input id="urlInput" type="text" placeholder="https://example.com" required>

    <!-- REQUIRED NEW UI ELEMENT -->
    <div id="typeWarning" style="color:#ff8080; font-size:14px; margin-top:4px;"></div>

    <!-- ACTIVATION COST NOTICE -->
    <p id="costNote" style="margin-top:10px; font-size:14px; color:#00e0ff;">
      Activation cost: 100 credits. This also becomes your starting credits for this link.
    </p>

    <button type="submit" class="primary-btn">Promote Link</button>

    <p id="formMessage" style="margin-top:10px; color:#ff8080;"></p>
  </form>

  <!-- ACTIVE PROMOTIONS -->
  <h2>Active Promotions</h2>
  <div id="activeList" class="promo-list"></div>

  <!-- DEPLETED / PAUSED PROMOTIONS -->
  <h2>Depleted / Paused Promotions</h2>
  <div id="depletedList" class="promo-list"></div>

</div>

<script type="module" src="promote.js"></script>

</body>
</html>
